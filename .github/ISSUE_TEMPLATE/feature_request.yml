name: ✨ Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! Please describe the use case before the solution — it helps us evaluate the right shape for the API.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Concrete use case or pain point. Real-world examples are best.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: How would you like to call it? Pseudocode is fine.
      render: php

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or related packages.

  - type: dropdown
    id: api-surface
    attributes:
      label: Which API surface is affected?
      multiple: true
      options:
        - Checkout
        - Payment Admin
        - Subscriptions
        - Webhook verification
        - Laravel integration
        - Testing / fakes
        - Transport / HTTP
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: svea-docs
    attributes:
      label: Relevant Svea API docs (if applicable)
      description: Link to the relevant page on paymentsdocs.svea.com
      placeholder: "https://paymentsdocs.svea.com/..."

