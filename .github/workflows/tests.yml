name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.3", "8.4", "8.5"]
      fail-fast: false

    name: PHP ${{ matrix.php }} — nordkit/svea

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --optimize-autoloader

      - name: Run tests
        run: vendor/bin/pest --compact

  php82-compat:
    runs-on: ubuntu-latest

    name: PHP 8.2 — compatibility (no-dev)

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring
          coverage: none

      - name: Install production dependencies only
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --ignore-platform-req=php

      - name: Verify autoloader
        run: php -r "require 'vendor/autoload.php'; echo 'OK' . PHP_EOL;"

  phpstan:
    runs-on: ubuntu-latest

    name: PHPStan

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src --memory-limit=512M

  lint:
    runs-on: ubuntu-latest

    name: Pint

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test

